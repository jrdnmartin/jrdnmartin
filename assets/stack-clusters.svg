<svg width="1600" height="340" viewBox="0 0 1600 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stack clusters</title>
  <desc id="desc">A grouped stack overview for systems, AI, infrastructure, and product web.</desc>
  <rect width="1600" height="340" rx="24" fill="#07101A"/>
  <text x="60" y="52" fill="#95B6D5" font-size="14" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.18em">STACK CLUSTERS / GROUPED CAPABILITIES</text>

  <rect x="52" y="84" width="352" height="206" rx="22" fill="#091828" stroke="#245981"/>
  <rect x="432" y="84" width="352" height="206" rx="22" fill="#091828" stroke="#245981"/>
  <rect x="812" y="84" width="352" height="206" rx="22" fill="#091828" stroke="#245981"/>
  <rect x="1192" y="84" width="352" height="206" rx="22" fill="#091828" stroke="#245981"/>

  <text x="80" y="128" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Systems</text>
  <text x="80" y="170" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Python / JavaScript / Flask / React Native</text>
  <path d="M80 216H302" stroke="#22D3EE" stroke-width="2"/>

  <text x="460" y="128" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AI</text>
  <text x="460" y="170" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">LLM systems / RAG / vector databases / modeling</text>
  <path d="M460 216H682" stroke="#3B82F6" stroke-width="2"/>

  <text x="840" y="128" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Infrastructure</text>
  <text x="840" y="170" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Docker / AWS EC2 / Tailscale / deployment workflows</text>
  <path d="M840 216H1062" stroke="#10B981" stroke-width="2"/>

  <text x="1220" y="128" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Product / Web</text>
  <text x="1220" y="170" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">WordPress / structured content / SEO systems</text>
  <path d="M1220 216H1442" stroke="#8B5CF6" stroke-width="2"/>
</svg>
