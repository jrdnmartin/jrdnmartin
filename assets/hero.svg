<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jordan M hero</title>
  <desc id="desc">A premium engineering control-surface hero with signal lines, telemetry panels, and applied systems branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060C16"/>
      <stop offset="0.55" stop-color="#08111F"/>
      <stop offset="1" stop-color="#091827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="1060" y1="72" x2="1470" y2="270" gradientUnits="userSpaceOnUse">
