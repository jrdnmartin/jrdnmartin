<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jordan M profile hero</title>
  <desc id="desc">A dark engineered console-style hero with signal lines, status modules, and technical accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101B"/>
      <stop offset="0.6" stop-color="#0B1524"/>
      <stop offset="1" stop-color="#0A1320"/>
    </linearGradient>
    <linearGradient id="accent" x1="1180" y1="76" x2="1480" y2="308" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="green" x1="1110" y1="348" x2="1470" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#17304B" stroke-opacity="0.35"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="560" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="560" rx="24" fill="url(#grid)"/>

