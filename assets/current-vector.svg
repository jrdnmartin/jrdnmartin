<svg width="1600" height="430" viewBox="0 0 1600 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Current vector</title>
  <desc id="desc">A directional systems diagram describing build direction, operating domains, and system interests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101A"/>
      <stop offset="1" stop-color="#091422"/>
    </linearGradient>
    <linearGradient id="path" x1="198" y1="214" x2="1414" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="430" rx="24" fill="url(#bg)"/>
  <text x="62" y="54" fill="#95B6D5" font-size="14" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.18em">CURRENT VECTOR / BUILD DIRECTION</text>

  <rect x="60" y="96" width="320" height="248" rx="22" fill="#091828" stroke="#23527B"/>
  <text x="88" y="136" fill="#A4C7E5" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">BUILDING TOWARD</text>
  <text x="88" y="184" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Applied systems</text>
  <text x="88" y="220" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Private AI infrastructure, reliable automation,</text>
  <text x="88" y="248" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">and software with clear operational value.</text>

  <rect x="640" y="72" width="320" height="108" rx="18" fill="#081420" stroke="#245981"/>
  <text x="668" y="110" fill="#A4C7E5" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">OPERATING DOMAINS</text>
  <text x="668" y="144" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AI systems / infrastructure</text>

  <rect x="640" y="202" width="320" height="108" rx="18" fill="#081420" stroke="#245981"/>
  <text x="668" y="240" fill="#A4C7E5" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">CARE ABOUT</text>
  <text x="668" y="274" fill="#F8FAFC" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">systems that hold up in use</text>

  <rect x="1220" y="96" width="320" height="248" rx="22" fill="#091828" stroke="#1E5F70"/>
  <text x="1248" y="136" fill="#A4C7E5" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">TARGET PROFILE</text>
  <text x="1248" y="184" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Commercially useful</text>
  <text x="1248" y="220" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Production-minded systems with clear</text>
  <text x="1248" y="248" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">deployment paths and business relevance.</text>

  <path d="M396 220H618" stroke="url(#path)" stroke-width="3"/>
  <circle cx="636" cy="220" r="8" fill="#22D3EE"/>
  <path d="M964 220H1196" stroke="url(#path)" stroke-width="3"/>
  <circle cx="1214" cy="220" r="8" fill="#10B981"/>

  <path d="M800 180V202" stroke="#245981" stroke-width="2"/>
  <path d="M800 310V334" stroke="#245981" stroke-width="2"/>
