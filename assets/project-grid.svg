<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project grid</title>
  <desc id="desc">A dashboard grid presenting four featured systems as branded engineering modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06101A"/>
      <stop offset="1" stop-color="#0A1320"/>
    </linearGradient>
    <linearGradient id="lineA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="lineB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" stroke="#17314A" stroke-opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1600" height="980" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="980" rx="24" fill="url(#grid)"/>
  <text x="64" y="52" fill="#95B6D5" font-size="14" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.18em">FEATURED SYSTEMS / ACTIVE MODULES</text>

  <rect x="52" y="88" width="710" height="380" rx="24" fill="#081420" stroke="#23527B"/>
  <rect x="838" y="88" width="710" height="380" rx="24" fill="#081420" stroke="#23527B"/>
  <rect x="52" y="512" width="710" height="380" rx="24" fill="#081420" stroke="#23527B"/>
  <rect x="838" y="512" width="710" height="380" rx="24" fill="#081420" stroke="#23527B"/>

  <text x="82" y="134" fill="#7DD3FC" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">01 / SECURITY + AI</text>
  <text x="82" y="182" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">VenomX</text>
  <text x="82" y="220" fill="#A8C0D7" font-size="18" font-family="Segoe UI, Arial, sans-serif">AI-powered penetration testing assistant</text>
  <text x="82" y="270" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">TECHNICAL CORE</text>
  <text x="82" y="302" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">vLLM, OpenWebUI, pgvector, Redis, modular Docker stack</text>
  <text x="82" y="354" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">WHY IT MATTERS</text>
  <text x="82" y="386" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Private deployment for accelerated internal security workflows.</text>
  <path d="M82 426H414" stroke="url(#lineA)" stroke-width="2"/>
  <circle cx="432" cy="426" r="6" fill="#22D3EE"/>

  <text x="868" y="134" fill="#7DD3FC" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">02 / PRODUCT SYSTEM</text>
  <text x="868" y="182" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Archeway</text>
  <text x="868" y="220" fill="#A8C0D7" font-size="18" font-family="Segoe UI, Arial, sans-serif">Your path to success</text>
  <text x="868" y="270" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">TECHNICAL CORE</text>
  <text x="868" y="302" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Workflow-oriented full-stack architecture with usability-first structure.</text>
  <text x="868" y="354" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">WHY IT MATTERS</text>
  <text x="868" y="386" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Turns application tracking into a visible, repeatable process.</text>
  <path d="M868 426H1200" stroke="url(#lineA)" stroke-width="2"/>
  <circle cx="1218" cy="426" r="6" fill="#3B82F6"/>

  <text x="82" y="558" fill="#8CF3D1" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">03 / VISION PIPELINE</text>
  <text x="82" y="606" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Restaurant Surveillance AI System</text>
  <text x="82" y="644" fill="#A8C0D7" font-size="18" font-family="Segoe UI, Arial, sans-serif">Overhead-camera tracking for operational environments</text>
  <text x="82" y="694" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">TECHNICAL CORE</text>
  <text x="82" y="726" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">YOLO, DeepSORT, ReID tuned for occlusion and identity ambiguity.</text>
  <text x="82" y="778" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">WHY IT MATTERS</text>
  <text x="82" y="810" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Built for real movement patterns where clean demo conditions do not exist.</text>
  <path d="M82 850H520" stroke="url(#lineB)" stroke-width="2"/>
  <circle cx="538" cy="850" r="6" fill="#10B981"/>

  <text x="868" y="558" fill="#8CF3D1" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.16em">04 / CLIENT SCALE WEB</text>
  <text x="868" y="606" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">IllinoisDrivers</text>
  <text x="868" y="644" fill="#A8C0D7" font-size="18" font-family="Segoe UI, Arial, sans-serif">Scalable insurance SEO system</text>
  <text x="868" y="694" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">TECHNICAL CORE</text>
  <text x="868" y="726" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">WordPress custom theme, schema, templating, page generation, tuning.</text>
  <text x="868" y="778" fill="#EDF5FC" font-size="17" font-family="Segoe UI, Arial, sans-serif">WHY IT MATTERS</text>
  <text x="868" y="810" fill="#8FA8BF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Creates maintainable city-page infrastructure built for scale and ranking.</text>
  <path d="M868 850H1320" stroke="url(#lineB)" stroke-width="2"/>
  <circle cx="1338" cy="850" r="6" fill="#14B8A6"/>
</svg>
